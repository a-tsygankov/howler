name: Deploy

# Auto-deploys backend (D1 migrations + Worker) and webapp (Pages) on
# every push to main. Path filters keep PRs and unrelated commits cheap:
# the backend job only runs when backend/** changed, same for webapp.
#
# Firmware is *not* deployed from CI — it requires a USB-connected
# device. Use ./scripts/deploy.sh --firmware from a workstation.
#
# Required secrets:
#   CLOUDFLARE_API_TOKEN   — Workers + D1 + Pages edit
#   CLOUDFLARE_ACCOUNT_ID  — 32-char hex from the dashboard sidebar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      webapp:  ${{ steps.filter.outputs.webapp }}
      firmware: ${{ steps.filter.outputs.firmware }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            webapp:
              - 'webapp/**'
            firmware:
              - 'firmware/**'

  backend-test:
    name: Backend test + typecheck
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm test

  backend-deploy:
    name: Backend deploy
    needs: [changes, backend-test]
    if: github.event_name == 'push' && needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .

      # Wrangler tracks applied migrations in d1_migrations — no
      # continue-on-error tolerance loop needed (plan §16 / §20.3).
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm db:migrate:remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy

  webapp-build:
    name: Webapp typecheck + build
    needs: changes
    if: needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: webapp } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm build

  webapp-deploy:
    name: Webapp deploy
    needs: [changes, webapp-build]
    if: github.event_name == 'push' && needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: webapp } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: webapp
          command: pages deploy dist --project-name=howler-webapp --branch=main

  firmware-build:
    name: Firmware sanity build
    needs: changes
    if: needs.changes.outputs.firmware == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: firmware } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install --upgrade platformio
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            firmware/.pio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Native domain tests (HIL-1)
        run: pio test -e native
      - name: Build (crowpanel)
        run: pio run -e crowpanel
      - name: Build (simulator — Wokwi)
        run: pio run -e simulator
