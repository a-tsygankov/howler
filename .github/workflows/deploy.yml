name: Deploy

# Auto-deploys backend (D1 migrations + Worker) and webapp (Pages) on
# every push to main. Path filters keep PRs and unrelated commits cheap:
# the backend job only runs when backend/** changed, same for webapp.
#
# Firmware is *not* deployed from CI — it requires a USB-connected
# device. Use ./scripts/deploy.sh --firmware from a workstation.
#
# Required secrets:
#   CLOUDFLARE_API_KEY     — Cloudflare *API token* (not the legacy
#                            global API key) with Workers + D1 +
#                            Pages edit scopes. Mapped at the use
#                            site to the env var CLOUDFLARE_API_TOKEN
#                            that wrangler reads at runtime.
#   CLOUDFLARE_ACCOUNT_ID  — 32-char hex from the dashboard sidebar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      webapp:  ${{ steps.filter.outputs.webapp }}
      firmware: ${{ steps.filter.outputs.firmware }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            webapp:
              - 'webapp/**'
            firmware:
              - 'firmware/**'

  backend-test:
    name: Backend test + typecheck
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from packageManager in root package.json.
      # Setting `version:` here would clash with that and fail the run.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm test

  backend-deploy:
    name: Backend deploy
    needs: [changes, backend-test]
    # Path filter handles the common case (push to main with
    # backend/** changes). workflow_dispatch is the manual escape
    # hatch for when migrations land via a workflow-only PR or a
    # prior deploy failed before applying them — see PR #10 / #11
    # context for the case that motivated this.
    if: |
      (github.event_name == 'push' && needs.changes.outputs.backend == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from packageManager in root package.json.
      # Setting `version:` here would clash with that and fail the run.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .

      # Wrangler tracks applied migrations in d1_migrations — no
      # continue-on-error tolerance loop needed (plan §16 / §20.3).
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm db:migrate:remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:   ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy

  webapp-build:
    name: Webapp typecheck + build
    needs: changes
    if: needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: webapp } }
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from packageManager in root package.json.
      # Setting `version:` here would clash with that and fail the run.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm build

  # On PRs only: deploy this PR's webapp to a per-branch Cloudflare
  # Pages preview so the E2E job below runs against the actual code
  # under review (the production alias only updates on push-to-main).
  # Cloudflare Pages slugifies branch → <slug>.<project>.pages.dev;
  # our branch names are already valid slugs.
  webapp-preview-deploy:
    name: Webapp preview deploy (PR)
    needs: [changes, webapp-build]
    if: github.event_name == 'pull_request' && needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.branch_url.outputs.url }}
    defaults: { run: { working-directory: webapp } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm build
      - id: branch_slug
        run: echo "slug=${GITHUB_HEAD_REF}" >> "$GITHUB_OUTPUT"
        shell: bash
      - id: branch_url
        run: |
          echo "url=https://${{ steps.branch_slug.outputs.slug }}.howler-webapp.pages.dev" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Deploy to Pages (branch preview)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: webapp
          command: pages deploy dist --project-name=howler-webapp --branch=${{ steps.branch_slug.outputs.slug }} --commit-dirty=true

  webapp-e2e:
    name: Webapp E2E (Playwright)
    needs: [changes, webapp-preview-deploy]
    if: github.event_name == 'pull_request' && needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: webapp } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E against branch preview
        env:
          E2E_BASE_URL: ${{ needs.webapp-preview-deploy.outputs.preview_url }}
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: webapp/playwright-report
          retention-days: 7

  webapp-deploy:
    name: Webapp deploy
    needs: [changes, webapp-build]
    # Same path-filter + dispatch escape hatch as backend-deploy
    # (PR #11) — without this, manually-dispatched runs only deploy
    # the backend half and the SPA falls out of sync.
    if: |
      (github.event_name == 'push' && needs.changes.outputs.webapp == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: webapp } }
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from packageManager in root package.json.
      # Setting `version:` here would clash with that and fail the run.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: webapp
          command: pages deploy dist --project-name=howler-webapp --branch=main

  firmware-build:
    name: Firmware sanity build
    needs: changes
    if: needs.changes.outputs.firmware == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: firmware } }
    outputs:
      sim_built: ${{ steps.simbuild.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install --upgrade platformio
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            firmware/.pio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Native domain + application tests (HIL-1)
        run: pio test -e native
      - name: Build (crowpanel)
        run: pio run -e crowpanel
      - name: Build (simulator — Wokwi)
        id: simbuild
        run: |
          pio run -e simulator
          echo "ok=true" >> "$GITHUB_OUTPUT"
      # Wokwi binary + diagram + elf are downstream inputs for HIL-2.
      - name: Upload simulator artifacts
        if: steps.simbuild.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-simulator
          path: |
            firmware/.pio/build/simulator/firmware.elf
            firmware/.pio/build/simulator/firmware-merged.bin
            firmware/diagram.json
            firmware/wokwi.toml
          retention-days: 1

  firmware-hil2:
    name: Firmware HIL-2 (Wokwi)
    needs: firmware-build
    # Only runs when the simulator built and the WOKWI_CLI_TOKEN
    # secret is present. The token gates the entire job — Wokwi CI
    # licenses are paid (free for personal but require sign-up); we
    # don't want every PR to red-cross because a fork doesn't have
    # the secret. The job is informational until the secret lands.
    if: needs.firmware-build.outputs.sim_built == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # upload-artifact@v4 preserves the workspace-relative path of
      # each input, so the artifact contains a `firmware/...` subtree.
      # Downloading with no `path:` (or `path: .`) recreates that
      # subtree in the workspace root — exactly where wokwi-cli
      # expects it (firmware/wokwi.toml + firmware/.pio/build/...).
      # The checkout step above already wrote `firmware/diagram.json`
      # and `firmware/wokwi.toml`; the download just adds the build
      # outputs alongside them.
      - uses: actions/download-artifact@v4
        with:
          name: firmware-simulator
          path: .
      # Branch on whether the secret is present without referencing
      # `secrets.*` from a job-level `if:` — those expressions don't
      # evaluate `secrets` at all in non-trusted contexts. The env
      # round-trip is the standard workaround.
      - name: Check WOKWI_CLI_TOKEN presence
        id: tok
        env:
          T: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::warning::WOKWI_CLI_TOKEN not set — HIL-2 will skip"
            echo "have=false" >> "$GITHUB_OUTPUT"
          else
            echo "have=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      # Official Wokwi action installs wokwi-cli, runs the simulator,
      # captures the serial log, and exits non-zero if `expect_text`
      # isn't seen within `timeout`. Skipped silently when the token
      # is absent.
      - name: HIL-2 boot smoke (Wokwi)
        if: steps.tok.outputs.have == 'true'
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: firmware
          timeout: 8000
          expect_text: '[howler] boot ok'
          serial_log_file: firmware/serial.log
      - name: Upload serial log
        if: always() && steps.tok.outputs.have == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hil2-serial-log
          path: firmware/serial.log
          retention-days: 7
          if-no-files-found: ignore
