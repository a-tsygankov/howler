name = "howler-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Run once to provision, then paste IDs in below:
#   wrangler d1 create howler-db
#   wrangler r2 bucket create howler-firmware
#   wrangler r2 bucket create howler-avatars
#   wrangler queues create occurrence-fire

[[d1_databases]]
binding = "DB"
database_name = "howler-db"
database_id = "39b29c7a-28b2-4bdf-93cd-bdb9cb031488"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "FIRMWARE"
bucket_name = "howler-firmware"

[[r2_buckets]]
binding = "AVATARS"
bucket_name = "howler-avatars"

[[queues.producers]]
binding = "OCCURRENCE_QUEUE"
queue = "occurrence-fire"

[[queues.consumers]]
queue = "occurrence-fire"
max_batch_size = 25
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "occurrence-fire-dlq"

# Cron fan-out — every minute, fire scheduled occurrences whose
# next_fire_at <= now. The handler enqueues onto OCCURRENCE_QUEUE
# and returns fast; per-occurrence work runs in the queue consumer.
[triggers]
crons = ["* * * * *"]

# Rate limiter on auth endpoints — 10 requests per 60 seconds per key.
# The middleware hashes endpoint+identifier into a stable key so a
# single hostile IP / login can't spray /api/auth/login.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# Workers Analytics Engine — fire-and-forget structured events for
# cron lag, ack latency, auth failures, push delivery. Query via the
# Cloudflare dashboard's SQL Analytics Engine view.
#
# DISABLED until Analytics Engine is enabled on the account at
#   https://dash.cloudflare.com/<account>/workers/analytics-engine
# Once enabled, uncomment and redeploy. The instrumentation code in
# src/observability.ts is already wired and is a no-op when the
# binding is missing, so the toggle is one config change.
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "howler_events"

[vars]
ENVIRONMENT = "development"
# AUTH_SECRET must be set as a secret in production:
#   wrangler secret put AUTH_SECRET
# PUSH_VAPID_PRIVATE_KEY must be set as a secret too:
#   wrangler secret put PUSH_VAPID_PRIVATE_KEY
# PUSH_VAPID_PUBLIC_KEY is non-secret (it's served to clients);
# generate a fresh keypair with `node scripts/gen-vapid.mjs`.
PUSH_VAPID_PUBLIC_KEY = "BOlOdaqrQjvihqh-4O5x76dov01ospCtCUpop4imLLYx5IjWFWuVXlaX9Ixd5No_Qdw5Vg9nQhThLKbyCZAcrPo"
VAPID_CONTACT = "mailto:noreply@howler.local"
# Phase 6 OTA — comma-separated home IDs allowed to admin-mutate
# /api/firmware (upload, promote, yank). Empty by default so a
# fresh / misconfigured deploy can't accidentally let anyone push
# firmware. Set in production via:
#   wrangler secret put ADMIN_HOMES
# (using a secret rather than a plain var keeps the list out of
# version control even though it's not strictly secret data).
ADMIN_HOMES = ""
# Phase 6 OTA slice F3 — R2 presigned-URL credentials. All three
# MUST be set as secrets in production for /api/firmware/check to
# return downloadUrl. Generate the access key in the Cloudflare
# dashboard under R2 → Manage R2 API Tokens (scope: read-only on
# howler-firmware). When any are missing, /check falls back to
# surfacing the raw r2Key so staging without R2 creds still works.
#   wrangler secret put R2_ACCOUNT_ID
#   wrangler secret put R2_ACCESS_KEY_ID
#   wrangler secret put R2_SECRET_ACCESS_KEY

[observability]
enabled = true
