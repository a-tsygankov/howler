; CrowPanel ESP32 Rotary Display 1.28" (Elecrow) — round 240x240 GC9A01 LCD,
; rotary encoder + push button, CST816D capacitive touch, 5-LED WS2812
; ring under the bezel. ESP32-S3R8V (16 MB flash, 8 MB OPI PSRAM).
;
; Pin map and TFT_eSPI flags are inherited verbatim from Feedme (its
; production board) — see plan.md §4 / §20.1 C4.
;
; Build envs:
;   crowpanel  → real hardware (GC9A01)
;   simulator  → Wokwi (ILI9341 substitute — Wokwi has no GC9A01 part)
;   native     → host-side Unity tests of pure domain layer

[common]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_build.partitions = partitions/default_16MB.csv
board_build.filesystem = littlefs
; ESP32-S3R8V ships with 8 MB OPI PSRAM. Wokwi can't service OPI flash
; bus mode, so [env:simulator] overrides this back to qio_qspi.
board_build.arduino.memory_type = qio_opi

build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; ── TFT_eSPI: configure via build flags so we don't have to edit User_Setup.h ──
    -DUSER_SETUP_LOADED=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    ; CrowPanel pin map — DC=3 (not 8), BL=46, MISO unused. GPIO 1
    ; must be driven HIGH from main() to power the LCD's 3.3 V rail.
    -DTFT_MOSI=11
    -DTFT_MISO=-1
    -DTFT_SCLK=10
    -DTFT_CS=9
    -DTFT_DC=3
    -DTFT_RST=14
    -DTFT_BL=46
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_RGB_ORDER=TFT_RGB
    -DUSE_HSPI_PORT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -I src

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    ; 9.0.0 is the last release before the lv_blend_helium.S ARM-SIMD
    ; file landed. PlatformIO's LDF compiles every source it finds in
    ; the lib, and the Helium asm fails to assemble for xtensa-esp32s3
    ; (it pulls C headers into xtensa-as). Bump once LVGL ships a clean
    ; library.json exclusion or we move to a CMake build (plan §17 #2).
    lvgl/lvgl@9.0.0
    bblanchon/ArduinoJson@^7.2.0
    adafruit/Adafruit NeoPixel@^1.12.0

[env:crowpanel]
extends = common
extra_scripts = pre:scripts/strip_lvgl_simd.py
upload_speed = 921600
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
build_flags =
    ${common.build_flags}
    -DGC9A01_DRIVER=1
    -DSPI_FREQUENCY=80000000
    ; Point the device at the deployed Worker (handoff.md "Live URLs").
    ; Override at build time with `-DHOWLER_BACKEND_URL='"…"'` if you
    ; spin up a separate Worker for device dev. Empty value falls back
    ; to NoopNetwork (UI is exercisable offline).
    -DHOWLER_BACKEND_URL='"https://howler-api.atsyg-feedme.workers.dev"'

[env:simulator]
extends = common
extra_scripts =
    pre:scripts/strip_lvgl_simd.py
    post:scripts/merge_simulator_bin.py
; Wokwi can't service OPI flash — override back to QSPI.
board_build.arduino.memory_type = qio_qspi
build_unflags =
    ${common.build_unflags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
build_flags =
    ${common.build_flags}
    -UARDUINO_USB_MODE
    -UARDUINO_USB_CDC_ON_BOOT
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; Wokwi has no GC9A01 part — substitute the closest SPI driver.
    -DILI9341_DRIVER=1
    -DSIMULATOR=1

; Host-side unit tests of the pure domain + application layers (no
; Arduino / LVGL headers — the application code carefully avoids
; them so SyncService, MarkDoneService etc. are testable on the host).
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
    -std=gnu++17
    -I src
    -I test
    ; Unity defaults to disabling DOUBLE asserts; enable so we can
    ; round-trip the double-typed result values in MarkDoneDraft.
    -DUNITY_INCLUDE_DOUBLE
build_src_filter =
    +<domain/>
    +<application/>
test_filter = test_*
